<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Payrails Onboarding Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #e9eef3;
    --surface: #ffffff;
    --ink: #16202a;
    --muted: #5b6b79;
    --line: #d7dee5;
    --accent: #0e7c86;       /* trust teal */
    --accent-soft: #e2f2f3;
    --warn: #b45309;         /* conflict amber - nuance, not error */
    --warn-soft: #fdf3e6;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(22,32,42,.06), 0 8px 24px rgba(22,32,42,.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    line-height: 1.55;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
  }
  .brand {
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
    max-width: 820px; margin: 0 auto;
  }
  .brand h1 {
    font-family: "Space Grotesk", sans-serif;
    font-size: 1.25rem; font-weight: 700; margin: 0; letter-spacing: -.01em;
  }
  .brand .tag {
    font-size: .8rem; color: var(--muted);
  }
  .brand .badge {
    margin-left: auto; font-family: "JetBrains Mono", monospace;
    font-size: .68rem; color: var(--accent);
    background: var(--accent-soft); padding: 3px 9px; border-radius: 999px;
  }

  main {
    flex: 1; overflow-y: auto; padding: 24px 16px 140px;
  }
  .feed { max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }

  .empty {
    text-align: center; color: var(--muted); margin-top: 8vh;
  }
  .empty h2 { font-family: "Space Grotesk", sans-serif; color: var(--ink); font-weight: 600; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 18px; }
  .chip {
    font-size: .82rem; color: var(--ink); background: var(--surface);
    border: 1px solid var(--line); border-radius: 999px; padding: 7px 14px; cursor: pointer;
    transition: border-color .15s, transform .05s;
  }
  .chip:hover { border-color: var(--accent); }
  .chip:active { transform: translateY(1px); }

  .msg.user {
    align-self: flex-end; background: var(--ink); color: #fff;
    padding: 10px 15px; border-radius: var(--radius) var(--radius) 4px var(--radius);
    max-width: 80%; font-weight: 500;
  }

  .answer {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
  }
  .answer .body { padding: 16px 18px; white-space: pre-wrap; }

  .confidence {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: "JetBrains Mono", monospace; font-size: .68rem;
    padding: 2px 8px; border-radius: 999px; margin-bottom: 10px;
  }
  .confidence.high { background: var(--accent-soft); color: var(--accent); }
  .confidence.medium { background: #eef1f4; color: var(--muted); }
  .confidence.low { background: var(--warn-soft); color: var(--warn); }

  /* Signature element: the conflict card */
  .conflict {
    margin: 0 18px 14px; padding: 12px 14px;
    background: var(--warn-soft); border: 1px solid #f0d9b6;
    border-left: 3px solid var(--warn); border-radius: 8px;
  }
  .conflict .label {
    font-family: "Space Grotesk", sans-serif; font-weight: 600;
    font-size: .82rem; color: var(--warn); margin-bottom: 4px;
    display: flex; align-items: center; gap: 7px;
  }
  .conflict .topic { font-weight: 600; }
  .conflict .res { font-size: .88rem; color: var(--ink); margin-top: 3px; }
  .conflict .lost {
    font-family: "JetBrains Mono", monospace; font-size: .72rem; color: var(--muted);
    margin-top: 5px;
  }

  /* Signature element: the source ledger */
  .ledger { border-top: 1px dashed var(--line); padding: 12px 18px 16px; }
  .ledger .head {
    font-size: .72rem; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin-bottom: 9px;
  }
  .cite {
    display: flex; gap: 10px; align-items: baseline; padding: 6px 0;
    border-bottom: 1px solid #eef1f4;
  }
  .cite:last-child { border-bottom: none; }
  .cite .file {
    font-family: "JetBrains Mono", monospace; font-size: .76rem; color: var(--accent);
    flex-shrink: 0;
  }
  .cite .meta { font-size: .72rem; color: var(--muted); flex-shrink: 0; }
  .cite .snip { font-size: .8rem; color: var(--muted); }

  .latency { font-family: "JetBrains Mono", monospace; font-size: .68rem; color: var(--muted); margin-top: 8px; }

  /* Composer */
  .composer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(180deg, rgba(233,238,243,0) 0%, var(--bg) 40%);
    padding: 16px; display: flex; justify-content: center;
  }
  .composer form {
    width: 100%; max-width: 820px; display: flex; gap: 10px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow); padding: 8px 8px 8px 16px;
  }
  .composer input {
    flex: 1; border: none; outline: none; font-size: .95rem; font-family: inherit;
    background: transparent; color: var(--ink);
  }
  .composer button {
    font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: .9rem;
    color: #fff; background: var(--accent); border: none; border-radius: 9px;
    padding: 9px 18px; cursor: pointer;
  }
  .composer button:disabled { opacity: .5; cursor: default; }
  .composer button:focus-visible, .chip:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  .dots span {
    display: inline-block; width: 6px; height: 6px; margin: 0 1px; border-radius: 50%;
    background: var(--muted); animation: blink 1.2s infinite both;
  }
  .dots span:nth-child(2){ animation-delay:.2s } .dots span:nth-child(3){ animation-delay:.4s }
  @keyframes blink { 0%,80%,100%{opacity:.25} 40%{opacity:1} }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>Onboarding Assistant</h1>
      <span class="tag">answers from the engineering docs — with sources</span>
      <span class="badge" id="badge">checking…</span>
    </div>
  </header>

  <main>
    <div class="feed" id="feed">
      <div class="empty" id="empty">
        <h2>Ask your first-week questions</h2>
        <p>Answers are grounded in the onboarding docs and show where they came from.<br/>
        When the docs disagree, you'll see exactly which one won and why.</p>
        <div class="chips">
          <button class="chip">How do I get access to staging?</button>
          <button class="chip">Who owns the Fraud Detection service?</button>
          <button class="chip">How many approvals does my PR need?</button>
          <button class="chip">When can I deploy to production?</button>
        </div>
      </div>
    </div>
  </main>

  <div class="composer">
    <form id="form">
      <input id="q" autocomplete="off" placeholder="Ask about access, ownership, deploys, reviews…" />
      <button id="send" type="submit">Ask</button>
    </form>
  </div>

<script>
const feed = document.getElementById('feed');
const empty = document.getElementById('empty');
const form = document.getElementById('form');
const input = document.getElementById('q');
const send = document.getElementById('send');

fetch('/health').then(r => r.json()).then(h => {
  const b = document.getElementById('badge');
  b.textContent = h.llm_configured ? h.answer_model : 'LLM disabled — retrieval only';
}).catch(() => {});

document.querySelectorAll('.chip').forEach(c =>
  c.addEventListener('click', () => { input.value = c.textContent; ask(); })
);

form.addEventListener('submit', e => { e.preventDefault(); ask(); });

function el(tag, cls, html) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (html !== undefined) n.innerHTML = html;
  return n;
}
function esc(s){ return (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function ask() {
  const question = input.value.trim();
  if (!question) return;
  empty.style.display = 'none';
  input.value = ''; send.disabled = true;

  feed.appendChild(el('div', 'msg user', esc(question)));

  const loading = el('div', 'answer');
  loading.innerHTML = '<div class="body"><span class="dots"><span></span><span></span><span></span></span></div>';
  feed.appendChild(loading);
  window.scrollTo(0, document.body.scrollHeight);

  try {
    const res = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question })
    });
    const data = await res.json();
    loading.remove();
    feed.appendChild(renderAnswer(data));
  } catch (err) {
    loading.querySelector('.body').textContent = "Something went wrong reaching the assistant. Is the server running?";
  }
  send.disabled = false;
  window.scrollTo(0, document.body.scrollHeight);
}

function renderAnswer(d) {
  const card = el('div', 'answer');
  const conf = (d.confidence || 'medium').toLowerCase();

  let html = '<div class="body">';
  html += `<span class="confidence ${conf}">confidence: ${esc(conf)}</span><br/>`;
  html += esc(d.answer);
  html += '</div>';

  for (const c of (d.conflicts || [])) {
    html += `<div class="conflict">
      <div class="label">⚠ Sources disagree</div>
      <div class="topic">${esc(c.topic)}</div>
      <div class="res">${esc(c.resolution)}</div>
      ${(c.losing_sources||[]).length ? `<div class="lost">overridden: ${c.losing_sources.map(esc).join(', ')}</div>` : ''}
    </div>`;
  }

  if ((d.citations || []).length) {
    html += '<div class="ledger"><div class="head">Sources</div>';
    for (const c of d.citations) {
      const meta = [c.owner, c.last_updated].filter(Boolean).join(' · ');
      html += `<div class="cite">
        <span class="file">${esc(c.doc)}</span>
        ${meta ? `<span class="meta">${esc(meta)}</span>` : ''}
        <span class="snip">${esc((c.snippet||'').slice(0,120))}</span>
      </div>`;
    }
    if (d.latency_ms) html += `<div class="latency">answered in ${d.latency_ms} ms</div>`;
    html += '</div>';
  }

  card.innerHTML = html;
  return card;
}
</script>
</body>
</html>
