<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Payrails Onboarding Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #e9eef3;
    --surface: #ffffff;
    --ink: #16202a;
    --muted: #5b6b79;
    --line: #d7dee5;
    --accent: #0e7c86;
    --accent-soft: #e2f2f3;
    --warn: #92400e;
    --warn-soft: #fffbeb;
    --warn-border: #fde68a;
    --warn-label: #b45309;
    --success: #065f46;
    --success-soft: #ecfdf5;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(22,32,42,.05), 0 4px 16px rgba(22,32,42,.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    line-height: 1.6;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
  }
  .brand {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    max-width: 820px; margin: 0 auto;
  }
  .brand h1 {
    font-family: "Space Grotesk", sans-serif;
    font-size: 1.2rem; font-weight: 700; margin: 0; letter-spacing: -.01em;
  }
  .brand .tag { font-size: .8rem; color: var(--muted); }
  .brand .badge {
    margin-left: auto; font-family: "JetBrains Mono", monospace;
    font-size: .68rem; color: var(--accent);
    background: var(--accent-soft); padding: 3px 9px; border-radius: 999px;
  }

  main { flex: 1; overflow-y: auto; padding: 24px 16px 140px; }
  .feed { max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }

  .empty { text-align: center; color: var(--muted); margin-top: 8vh; }
  .empty h2 { font-family: "Space Grotesk", sans-serif; color: var(--ink); font-weight: 600; margin-bottom: 8px; }
  .empty p { margin: 0 0 20px; font-size: .9rem; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .chip {
    font-size: .82rem; color: var(--ink); background: var(--surface);
    border: 1px solid var(--line); border-radius: 999px; padding: 7px 14px; cursor: pointer;
    transition: border-color .15s, transform .05s; font-family: inherit;
  }
  .chip:hover { border-color: var(--accent); }
  .chip:active { transform: translateY(1px); }

  .msg.user {
    align-self: flex-end; background: var(--ink); color: #fff;
    padding: 10px 16px; border-radius: var(--radius) var(--radius) 4px var(--radius);
    max-width: 80%; font-weight: 500; font-size: .95rem;
  }

  /* ── Answer card ── */
  .answer {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
  }

  /* Answer text — leads the card, no badge competing above it */
  .answer-body {
    padding: 18px 20px 14px;
    font-size: .95rem; line-height: 1.7; color: var(--ink);
    white-space: pre-wrap;
  }

  /* Inline code style for things like URLs, role names */
  .answer-body code {
    font-family: "JetBrains Mono", monospace; font-size: .82em;
    background: #f0f4f7; padding: 1px 5px; border-radius: 4px; color: var(--ink);
  }

  /* Outdated doc warning — plain English, not jargon */
  .outdated-notice {
    margin: 0 16px 14px;
    background: var(--warn-soft);
    border: 1px solid var(--warn-border);
    border-radius: 10px;
    padding: 11px 14px;
  }
  .outdated-notice .notice-label {
    font-size: .78rem; font-weight: 600; color: var(--warn-label);
    display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
  }
  .outdated-notice .notice-label svg { flex-shrink: 0; }
  .outdated-notice .notice-text {
    font-size: .84rem; color: #78350f; line-height: 1.55;
  }

  /* Sources — collapsed by default, expandable */
  .sources-toggle {
    border-top: 1px solid var(--line);
    padding: 0;
  }
  .sources-toggle summary {
    list-style: none; cursor: pointer;
    padding: 10px 20px;
    font-size: .8rem; color: var(--muted);
    display: flex; align-items: center; gap: 7px;
    user-select: none;
    transition: background .1s;
  }
  .sources-toggle summary:hover { background: #f5f7f9; }
  .sources-toggle summary::-webkit-details-marker { display: none; }
  .sources-toggle summary .chevron {
    margin-left: auto; transition: transform .2s;
  }
  .sources-toggle[open] summary .chevron { transform: rotate(180deg); }

  .source-list { padding: 2px 20px 14px; display: flex; flex-direction: column; gap: 8px; }
  .source-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 9px 12px;
    background: #f8fafc; border: 1px solid var(--line);
    border-radius: 9px;
  }
  .source-icon { margin-top: 1px; flex-shrink: 0; }
  .source-name { font-size: .84rem; font-weight: 500; color: var(--ink); }
  .source-meta { font-size: .75rem; color: var(--muted); margin-top: 1px; }
  .source-snippet { font-size: .78rem; color: var(--muted); margin-top: 4px; font-style: italic; line-height: 1.5; }

  /* Footer bar: confidence + latency */
  .answer-footer {
    border-top: 1px solid var(--line);
    padding: 8px 20px;
    display: flex; align-items: center; gap: 8px;
    font-size: .75rem; color: var(--muted);
  }
  .conf-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }
  .conf-dot.high { background: #0e7c86; }
  .conf-dot.medium { background: #d97706; }
  .conf-dot.low { background: #dc2626; }
  .answer-footer .sep { color: var(--line); }

  /* Loading dots */
  .dots span {
    display: inline-block; width: 6px; height: 6px; margin: 0 2px; border-radius: 50%;
    background: var(--muted); animation: blink 1.2s infinite both;
  }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.25} 40%{opacity:1} }

  /* Composer */
  .composer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(180deg, rgba(233,238,243,0) 0%, var(--bg) 40%);
    padding: 16px; display: flex; justify-content: center;
  }
  .composer form {
    width: 100%; max-width: 820px; display: flex; gap: 10px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow); padding: 8px 8px 8px 16px;
  }
  .composer input {
    flex: 1; border: none; outline: none; font-size: .95rem; font-family: inherit;
    background: transparent; color: var(--ink);
  }
  .composer button {
    font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: .9rem;
    color: #fff; background: var(--accent); border: none; border-radius: 9px;
    padding: 9px 18px; cursor: pointer; transition: opacity .15s;
  }
  .composer button:disabled { opacity: .45; cursor: default; }
  .composer button:focus-visible, .chip:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>Onboarding Assistant</h1>
      <span class="tag">answers from the engineering docs — with sources</span>
      <span class="badge" id="badge">checking…</span>
    </div>
  </header>

  <main>
    <div class="feed" id="feed">
      <div class="empty" id="empty">
        <h2>Ask your first-week questions</h2>
        <p>Answers come straight from the onboarding docs.<br/>
        When docs disagree, you'll see exactly which one to trust and why.</p>
        <div class="chips">
          <button class="chip">How do I get access to staging?</button>
          <button class="chip">Who owns the Fraud Detection service?</button>
          <button class="chip">How many approvals does my PR need?</button>
          <button class="chip">When can I deploy to production?</button>
        </div>
      </div>
    </div>
  </main>

  <div class="composer">
    <form id="form">
      <input id="q" autocomplete="off" placeholder="Ask about access, ownership, deploys, reviews…" />
      <button id="send" type="submit">Ask</button>
    </form>
  </div>

<script>
const feed = document.getElementById('feed');
const empty = document.getElementById('empty');
const form = document.getElementById('form');
const input = document.getElementById('q');
const send = document.getElementById('send');

fetch('/health').then(r => r.json()).then(h => {
  const b = document.getElementById('badge');
  b.textContent = h.llm_configured ? h.answer_model : 'LLM disabled — retrieval only';
}).catch(() => {});

document.querySelectorAll('.chip').forEach(c =>
  c.addEventListener('click', () => { input.value = c.textContent; ask(); })
);

form.addEventListener('submit', e => { e.preventDefault(); ask(); });

function el(tag, cls, html) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (html !== undefined) n.innerHTML = html;
  return n;
}

function esc(s) {
  return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
}

// Friendly human-readable name from a filename like "01-environments-and-access.md"
function friendlyDocName(filename) {
  const map = {
    '00-README-engineering-onboarding.md': 'Engineering onboarding guide',
    '01-environments-and-access.md': 'Environments & access guide',
    '02-it-helpdesk-faq.md': 'IT helpdesk FAQ',
    '03-code-review-and-prs.md': 'Code review & PR rules',
    '04-payments-team-playbook.md': 'Payments team playbook',
    '05-service-catalog-and-owners.md': 'Service catalog',
    '06-org-changes-2026.md': 'Org changes log (2026)',
    '07-deploys-releases-oncall.md': 'Deploys, releases & on-call',
    '08-glossary-and-common-questions.md': 'Glossary & common questions',
  };
  return map[filename] || filename;
}

// Convert a conflict resolution string into a plain-English explanation
// e.g. "01-environments... (authority rank 2, updated 2026-04-30): no VPN needed..."
// → "The IT helpdesk FAQ lost because it has a lower authority and is significantly older."
function humaniseConflict(conflict) {
  const losers = (conflict.losing_sources || []).map(friendlyDocName);
  const loserStr = losers.length ? losers.join(' and ') : 'an older doc';
  // Try to detect reason words in the resolution text
  const res = (conflict.resolution || '').toLowerCase();
  let reason = '';
  if (res.includes('older') || res.includes('2023') || res.includes('date')) {
    reason = 'it is significantly out of date';
  } else if (res.includes('authority') || res.includes('rank') || res.includes('org-wide')) {
    reason = 'the org-wide rule takes priority over team-level docs';
  } else if (res.includes('change log') || res.includes('org change')) {
    reason = 'the org change log overrides the service catalog';
  } else {
    reason = 'it has lower authority';
  }
  return `<strong>${esc(loserStr)}</strong> has outdated information on this — ${reason}.`;
}

async function ask() {
  const question = input.value.trim();
  if (!question) return;
  empty.style.display = 'none';
  input.value = '';
  send.disabled = true;

  feed.appendChild(el('div', 'msg user', esc(question)));

  const loading = el('div', 'answer');
  loading.innerHTML = '<div class="answer-body"><span class="dots"><span></span><span></span><span></span></span></div>';
  feed.appendChild(loading);
  window.scrollTo(0, document.body.scrollHeight);

  try {
    const res = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question })
    });
    const data = await res.json();
    loading.remove();
    feed.appendChild(renderAnswer(data));
  } catch (err) {
    loading.querySelector('.answer-body').textContent =
      'Something went wrong reaching the assistant. Is the server running?';
  }
  send.disabled = false;
  window.scrollTo(0, document.body.scrollHeight);
}

function renderAnswer(d) {
  const card = el('div', 'answer');
  const conf = (d.confidence || 'medium').toLowerCase();
  const conflicts = d.conflicts || [];
  const citations = d.citations || [];

  // ── 1. Answer text — leads the card ──
  const bodyDiv = el('div', 'answer-body');
  bodyDiv.textContent = d.answer; // safe, no innerHTML needed for answer text
  card.appendChild(bodyDiv);

  // ── 2. Outdated doc notices — one per conflict, plain English ──
  for (const c of conflicts) {
    const notice = el('div', 'outdated-notice');
    notice.innerHTML = `
      <div class="notice-label">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M10 2L2 17h16L10 2z" stroke="#b45309" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
          <line x1="10" y1="9" x2="10" y2="13" stroke="#b45309" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="10" cy="15.5" r="0.8" fill="#b45309"/>
        </svg>
        One doc has outdated information on this
      </div>
      <div class="notice-text">${humaniseConflict(c)}</div>`;
    card.appendChild(notice);
  }

  // ── 3. Sources — collapsed by default ──
  if (citations.length) {
    const details = document.createElement('details');
    details.className = 'sources-toggle';

    const summary = document.createElement('summary');
    summary.innerHTML = `
      <svg class="source-icon" width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <rect x="3" y="2" width="14" height="16" rx="2" stroke="#5b6b79" stroke-width="1.6" fill="none"/>
        <line x1="6" y1="7" x2="14" y2="7" stroke="#5b6b79" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="6" y1="10.5" x2="14" y2="10.5" stroke="#5b6b79" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="6" y1="14" x2="10" y2="14" stroke="#5b6b79" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Based on ${citations.length} source${citations.length > 1 ? 's' : ''}
      <svg class="chevron" width="12" height="12" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M5 8l5 5 5-5" stroke="#5b6b79" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
    details.appendChild(summary);

    const list = el('div', 'source-list');
    for (const c of citations) {
      const meta = [c.owner, c.last_updated].filter(Boolean).join(' · ');
      const item = el('div', 'source-item');
      item.innerHTML = `
        <svg class="source-icon" width="15" height="15" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="10" r="8" stroke="#0e7c86" stroke-width="1.6" fill="none"/>
          <path d="M7 10l2 2 4-4" stroke="#0e7c86" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div>
          <div class="source-name">${esc(friendlyDocName(c.doc))}</div>
          ${meta ? `<div class="source-meta">${esc(meta)}</div>` : ''}
          ${c.snippet ? `<div class="source-snippet">"${esc((c.snippet || '').slice(0, 130))}"</div>` : ''}
        </div>`;
      list.appendChild(item);
    }
    details.appendChild(list);
    card.appendChild(details);
  }

  // ── 4. Footer: confidence signal + latency ──
  const confLabels = {
    high: 'Answer verified — sources agree',
    medium: 'Docs had conflicting info — used the more authoritative source',
    low: 'Limited information found — check #eng-help to confirm',
  };
  const footer = el('div', 'answer-footer');
  footer.innerHTML = `
    <span class="conf-dot ${conf}" title="confidence: ${conf}"></span>
    <span>${esc(confLabels[conf] || conf)}</span>
    ${d.latency_ms ? `<span class="sep">·</span><span>answered in ${d.latency_ms} ms</span>` : ''}`;
  card.appendChild(footer);

  return card;
}
</script>
</body>
</html>
